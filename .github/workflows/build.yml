name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-glfw-windows-x86_64:
    name: Build (GLFW/Windows x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get commit info
        id: commit-info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=short)" >> $GITHUB_OUTPUT

      - name: Install MinGW and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64

      - name: Build GLFW for MinGW
        run: |
          git clone https://github.com/glfw/glfw.git /tmp/glfw
          git -C /tmp/glfw checkout fdd14e65b1c29e4e6df875fb5669ec00d6793531
          cmake -B /tmp/glfw/build -S /tmp/glfw \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/mingw-w64.cmake \
            -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 \
            -DGLFW_BUILD_EXAMPLES=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_DOCS=OFF
          make -C /tmp/glfw/build -j$(nproc)
          sudo make -C /tmp/glfw/build install

      - name: Build bzip2 for MinGW
        run: |
          curl -L https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz -o /tmp/bzip2.tar.gz
          tar -xf /tmp/bzip2.tar.gz -C /tmp
          make -C /tmp/bzip2-1.0.8 libbz2.a CC=x86_64-w64-mingw32-gcc AR=x86_64-w64-mingw32-ar RANLIB=x86_64-w64-mingw32-ranlib -j$(nproc)
          sudo cp /tmp/bzip2-1.0.8/libbz2.a /usr/x86_64-w64-mingw32/lib/
          sudo cp /tmp/bzip2-1.0.8/bzlib.h /usr/x86_64-w64-mingw32/include/

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-w64.cmake -DDESKTOP_BACKEND=glfw3 -DCMAKE_BUILD_TYPE=Release "-DBUTTERSCOTCH_COMMIT_HASH=${{ steps.commit-info.outputs.hash }}" "-DBUTTERSCOTCH_COMMIT_DATE=${{ steps.commit-info.outputs.date }}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-glfw-windows-x86_64
          path: build/butterscotch.exe

  build-glfw-windows-x86:
    name: Build (GLFW/Windows x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Time
        id: get-time
        run: echo "time=$(date -u '+%Y-%m-%d-%H:%M:%S')" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ~/ccache.tar.xz
          key: win32-artifact-${{ steps.get-time.outputs.time }}
          restore-keys: win32-artifact-
      - name: Unpack cache
        run: |
          cd ~
          [ -f ccache.tar.xz ] && tar xf ccache.tar.xz || true
          [ -f workspacecache.tar ] && mv workspacecache.tar ${{ github.workspace }} || true

      - name: Get commit info
        id: commit-info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=short)" >> $GITHUB_OUTPUT

      - name: Install MinGW and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache libgmp-dev libmpfr-dev libmpc-dev
          [ -f workspacecache.tar ] && tar xf workspacecache.tar
          ARCH=i486 ./artifacts/windows/build-toolchain.sh
          tar cf workspacecache.tar artifacts/windows/build/toolchain-i486
          mv workspacecache.tar ~

      - name: Build
        run: |
          PATH="$PWD/artifacts/windows/build/toolchain-i486/bin:$PATH" make \
              NO_COLOR=1 \
              VERBOSE=1 \
              CC='ccache i486-w64-mingw32-gcc' \
              OS=Windows \
              DESKTOP_BACKEND=glfw2 \
              GLFW2_LIBS='-lglfw -lopengl32' \
              EXTRALIBS='-latomic' \
              BUTTERSCOTCH_COMMIT_HASH=${{ steps.commit-info.outputs.hash }} \
              BUTTERSCOTCH_COMMIT_DATE=${{ steps.commit-info.outputs.date }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-glfw-windows-x86
          path: build/butterscotch.exe
      - name: Pack cache
        run: cd ~ && tar cJf ccache.tar.xz .cache/ccache workspacecache.tar
  
  build-ps3:
    name: Build (PS3)
    runs-on: ubuntu-latest
    container: scummvm/dockerized-toolchains:ps3
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DPLATFORM=ps3 -DCMAKE_TOOLCHAIN_FILE=cmake/ppu.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build bzip2 for PS3
        run: |
          curl -L https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz -o /tmp/bzip2.tar.gz
          tar -xf /tmp/bzip2.tar.gz -C /tmp
          make -C /tmp/bzip2-1.0.8 libbz2.a CFLAGS="-mcpu=cell -mtune=cell -maltivec -mhard-float -fmodulo-sched -ffunction-sections -fdata-sections -fomit-frame-pointer -fstrict-aliasing -funroll-loops -ftree-vectorize -Wall -Winline -O2 -g -D_FILE_OFFSET_BITS=64" CC=powerpc64-ps3-elf-gcc AR=powerpc64-ps3-elf-ar RANLIB=powerpc64-ps3-elf-ranlib -j$(nproc)
          cp /tmp/bzip2-1.0.8/libbz2.a /usr/local/ps3dev/portlibs/ppu/lib/
          cp /tmp/bzip2-1.0.8/bzlib.h /usr/local/ps3dev/portlibs/ppu/include/

      - name: Build
        run: |
          cmake --build build -j$(nproc)
          sprxlinker build/butterscotch.elf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-ps3
          path: build/butterscotch.elf
